{# _desktop_sidebar.html — include this inside .tg-desktop on desktop pages #}
<aside class="ds-sidebar">
    <div class="ds-header">
        <a href="{{ url_for('profile', user_id=current_user.id) }}" class="ds-profile">
            <img src="{{ url_for('static', filename='uploads/' + current_user.avatar) }}"
                 alt="Avatar"
                 class="ds-profile-avatar"
                 onerror="this.src='{{ url_for('static', filename='uploads/avatars/default.png') }}'">
            <div>
                <div class="ds-profile-name">{{ current_user.username }}</div>
                <div class="ds-profile-status">● Онлайн</div>
            </div>
        </a>
        <div class="ds-header-actions">
            <a href="{{ url_for('contacts') }}" class="ds-icon-btn" title="Контакты">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
            </a>
            <a href="{{ url_for('security') }}" class="ds-icon-btn" title="Настройки">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </a>
            <a href="{{ url_for('logout') }}" class="ds-icon-btn danger" title="Выйти">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
            </a>
        </div>
    </div>

    <div class="ds-search">
        <svg width="15" height="15" viewBox="0 0 1024 1024"><use xlink:href="#icon-search"></use></svg>
        <input type="text" placeholder="Поиск" oninput="dsFilterChats(this.value)">
    </div>

    <div class="ds-chats-list" id="dsChatsList">
        {# Populated by desktop_sidebar.js via /api/get_chats_data #}
        <div class="ds-empty">
            <svg width="40" height="40" viewBox="0 0 1024 1024"><use xlink:href="#icon-chat"></use></svg>
            <p>Загрузка...</p>
        </div>
    </div>

    <button class="ds-fab" onclick="dsOpenSheet()" title="Новый чат">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
    </button>
</aside>

{# Sheet + Modals #}
<div class="ds-sheet-overlay" id="dsSheetOverlay" onclick="dsCloseSheet()"></div>
<div class="ds-sheet" id="dsSheet">
    <div class="ds-sheet-handle"></div>
    <div class="ds-sheet-title">Создать</div>
    <button class="ds-sheet-item" onclick="dsCloseSheet(); document.getElementById('dsNewChatModal').classList.add('active')">
        <div class="ds-sheet-icon blue">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="ds-sheet-label"><strong>Личный чат</strong><span>Напишите любому пользователю</span></div>
    </button>
    <button class="ds-sheet-item" onclick="dsCloseSheet(); document.getElementById('dsCreateGroupModal').classList.add('active')">
        <div class="ds-sheet-icon purple">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <div class="ds-sheet-label"><strong>Группа</strong><span>Чат для нескольких участников</span></div>
    </button>
</div>

<div class="ds-modal-overlay" id="dsNewChatModal">
    <div class="ds-modal-box">
        <div class="ds-modal-title">
            Новый личный чат
            <button class="ds-modal-close" onclick="document.getElementById('dsNewChatModal').classList.remove('active')">&times;</button>
        </div>
        <form method="POST" action="{{ url_for('start_chat') }}">
            <div class="ds-form-group">
                <label>Имя пользователя</label>
                <input type="text" name="username" placeholder="Введите username" required>
            </div>
            <div class="ds-modal-actions">
                <button type="button" class="ds-btn ds-btn-secondary" onclick="document.getElementById('dsNewChatModal').classList.remove('active')">Отмена</button>
                <button type="submit" class="ds-btn ds-btn-primary">Начать чат</button>
            </div>
        </form>
    </div>
</div>

<div class="ds-modal-overlay" id="dsCreateGroupModal">
    <div class="ds-modal-box">
        <div class="ds-modal-title">
            Создать группу
            <button class="ds-modal-close" onclick="document.getElementById('dsCreateGroupModal').classList.remove('active')">&times;</button>
        </div>
        <form id="dsCreateGroupForm" enctype="multipart/form-data">
            <div class="ds-form-group"><label>Название</label><input type="text" name="name" placeholder="Например: Друзья" required></div>
            <div class="ds-form-group"><label>Описание</label><textarea name="description" placeholder="Опишите тему..." rows="3"></textarea></div>
            <div class="ds-form-group"><label>Иконка</label><input type="file" name="icon" accept="image/*"></div>
            <div class="ds-modal-actions">
                <button type="button" class="ds-btn ds-btn-secondary" onclick="document.getElementById('dsCreateGroupModal').classList.remove('active')">Отмена</button>
                <button type="submit" class="ds-btn ds-btn-primary">Создать</button>
            </div>
        </form>
    </div>
</div>

<script>
function dsOpenSheet()  { document.getElementById('dsSheet').classList.add('active'); document.getElementById('dsSheetOverlay').classList.add('active'); }
function dsCloseSheet() { document.getElementById('dsSheet').classList.remove('active'); document.getElementById('dsSheetOverlay').classList.remove('active'); }

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        dsCloseSheet();
        document.querySelectorAll('.ds-modal-overlay.active').forEach(m => m.classList.remove('active'));
    }
});

const _cgForm = document.getElementById('dsCreateGroupForm');
if (_cgForm) {
    _cgForm.addEventListener('submit', function(e) {
        e.preventDefault();
        fetch('/group/create', { method: 'POST', body: new FormData(this) })
            .then(r => { if (r.redirected) window.location.href = r.url; else return r.json().then(d => alert(d.error || 'Ошибка')); })
            .catch(() => alert('Ошибка'));
    });
}
</script>
